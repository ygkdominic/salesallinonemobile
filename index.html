<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>26년 5월 현대자동차 Sales All-in-One</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
:root{--p:#003087;--bg:#F0F4F8;--bd:#DDE3EC;--tx:#1A1A2E;--mu:#6B7A99;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:14px;}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;padding-bottom:140px;}

/* ── TOP HEADER ── */
.top-header{background:#002C5F;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,44,.25);}
.region-badge{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.4);color:#00D4FF;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
.menu-toggle{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── HERO ── */
.hero{background:linear-gradient(155deg,#001830 0%,#003087 40%,#004080 75%,#005599 100%);padding:26px 16px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00AAD2,#00D4FF,#00AAD2);}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.88);font-size:11px;font-weight:600;padding:6px 14px;border-radius:30px;margin-bottom:12px;}
.hero-title{font-size:22px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:10px;letter-spacing:-.3px;}
.hero-title .ac{color:#00D4FF;}
.hero-sub{font-size:12px;color:rgba(255,255,255,.8);font-weight:500;line-height:1.7;}

/* ── LAYOUT ── */
.layout{display:block;}

/* ── MOBILE DRAWER SIDEBAR ── */
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:400;}
.sidebar-overlay.open{display:block;}
.sidebar{width:268px;background:#fff;border-right:1px solid var(--bd);overflow-y:auto;position:fixed;top:0;left:-268px;height:100vh;z-index:500;transition:left .28s ease;box-shadow:4px 0 20px rgba(0,0,0,.15);}
.sidebar.open{left:0;}
.sidebar-close-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd);background:#f8faff;}
.sidebar-close-title{font-size:14px;font-weight:800;color:var(--p);}
.sidebar-close-btn{background:#eee;border:none;font-size:18px;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.sb-group{padding:2px 0;}
.sb-label{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.8px;padding:6px 14px 3px;display:flex;align-items:center;gap:5px;text-transform:uppercase;}
.sb-label::after{content:'';flex:1;height:1px;background:var(--bd);}
.car-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;color:#444;text-align:left;transition:all .18s;border-left:3px solid transparent;min-height:44px;}
.car-btn:hover,.car-btn:active{background:#F0F7FF;color:var(--p);}
.car-btn.active{background:linear-gradient(90deg,#E8F0FE,#F5F8FF);color:var(--p);border-left-color:var(--p);}
.ci{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.car-btn-name{flex:1;}
.ctag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.t-ev{background:#E0F2F1;color:#00695C;}.t-hev{background:#F1F8E9;color:#558B2F;}.t-fcev{background:#EDE7F6;color:#4527A0;}.t-ice{background:#E3F2FD;color:#1565C0;}.t-all{background:#F3E5F5;color:#6A1B9A;}.t-sum{background:#FFF3E0;color:#E65100;}

/* ── MAIN ── */
.main{padding:14px;}
.car-panel{display:none;}.car-panel.active{display:block;animation:fs .28s ease;}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CAR HEADER ── */
.car-hd{border-radius:12px;padding:14px 16px;margin-bottom:14px;color:#fff;display:flex;align-items:flex-start;gap:10px;box-shadow:0 4px 18px rgba(0,0,0,.2);}
.car-hd-icon{font-size:28px;flex-shrink:0;margin-top:2px;}
.car-hd-info{flex:1;min-width:0;}
.car-hd-title{font-size:18px;font-weight:800;}
.car-hd-sub{font-size:11px;opacity:.85;margin-top:3px;line-height:1.5;}
.car-hd-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.ftag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.22);}

/* ── SECTION LABELS ── */
.sl{font-size:13px;font-weight:800;color:#fff;padding:8px 14px;border-radius:8px;margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.sl-tip{background:linear-gradient(90deg,#2E7D32,#43A047);}
.sl-sale{background:linear-gradient(90deg,#E65100,#FF8F00);}
.sl-promo{background:linear-gradient(90deg,#1565C0,#0288D1);}
.sl-loan{background:linear-gradient(90deg,#003087,#1565C0);}

/* ── VTABS / PTABS (가로 스크롤) ── */
.vtabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--bd);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.vtabs::-webkit-scrollbar{display:none;}
.ptabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:11px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.ptabs::-webkit-scrollbar{display:none;}
.vtab,.ptab{padding:7px 13px;border-radius:8px;border:2px solid var(--bd);background:#fff;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;min-height:36px;flex-shrink:0;}
.vtab{border-radius:20px;}
.vtab:hover,.ptab:hover{border-color:var(--p);color:var(--p);}
.vtab.active,.ptab.active{background:var(--p);color:#fff;border-color:var(--p);}
.ptab.active{box-shadow:0 2px 8px rgba(0,48,135,.3);}
.vpanel,.ppanel{display:none;}.vpanel.active,.ppanel.active{display:block;animation:fs .2s;}

/* ── SCARD ── */
.scard{background:#fff;border-radius:11px;border:1px solid var(--bd);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.stitle{font-size:13px;font-weight:700;color:var(--p);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--bd);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ── TABLES (가로 스크롤) ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:6px;}
.rt{width:100%;border-collapse:collapse;font-size:12px;min-width:260px;}
.rt th{background:var(--p);color:#fff;padding:8px 10px;text-align:center;font-weight:700;font-size:11px;}
.rt th:first-child{text-align:left;border-radius:6px 0 0 0;}.rt th:last-child{border-radius:0 6px 0 0;}
.rt td{padding:8px 10px;border-bottom:1px solid #F0F4F8;text-align:center;font-size:12px;}
.rt td.lb{text-align:left;font-weight:600;color:#444;background:#FAFBFD;border-right:1px solid #EEF2F8;white-space:nowrap;}
.rt tr:last-child td{border-bottom:none;}
.rt tr:hover td{background:#F5F8FF;}

.stbl{width:100%;border-collapse:collapse;font-size:11px;min-width:560px;}
.stbl th{background:var(--p);color:#fff;padding:7px 8px;font-weight:700;text-align:center;}
.stbl th.lh{text-align:left;}
.stbl td{padding:7px 8px;border-bottom:1px solid #EEF2F8;text-align:center;vertical-align:middle;font-size:11px;}
.stbl td.slb2{text-align:left;font-weight:700;background:#F7F9FF;border-right:1px solid #E0E8F8;white-space:nowrap;}
.stbl tr:hover td{background:#F0F6FF;}

/* 뱃지 / 색상 칩 */
.r1{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:12px;background:#E3F2FD;color:#1565C0;}
.r2{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:12px;background:#FFF3E0;color:#E65100;}
.rev{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:12px;background:#E0F2F1;color:#00695C;}
.rzero{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:12px;background:#EDE7F6;color:#4527A0;}
.rred{display:inline-block;padding:2px 8px;border-radius:5px;font-weight:700;font-size:12px;background:#FFEBEE;color:#C62828;}

/* ── BOX 컴포넌트 ── */
.wbox{background:#FFF8E1;border-left:4px solid #FFA000;border-radius:8px;padding:10px 13px;font-size:12px;color:#5D4037;margin-bottom:12px;line-height:1.65;font-weight:500;}
.wbox strong{color:#E65100;}
.pbox{background:#EBF3FF;border-left:4px solid #1565C0;border-radius:8px;padding:11px 13px;margin-bottom:12px;}
.pbox h4{font-size:13px;font-weight:700;color:#003087;margin-bottom:7px;}
.pbox li{font-size:12px;color:#333;padding:3px 0 3px 18px;position:relative;list-style:none;line-height:1.5;}
.pbox li::before{content:'✓';position:absolute;left:0;color:#1565C0;font-weight:700;}
.fbox{background:linear-gradient(135deg,#FFF8E1,#FFFDE7);border:2px solid #FFB300;border-radius:10px;padding:12px 13px;margin-bottom:12px;}
.fbox-title{font-size:13px;font-weight:800;color:#E65100;margin-bottom:8px;}
.fbox ul{list-style:none;padding:0;}
.fbox li{font-size:12px;color:#5D4037;font-weight:500;padding:4px 0 4px 20px;position:relative;line-height:1.55;}
.fbox li::before{content:'💰';position:absolute;left:0;font-size:12px;}
.tip-box{background:#F0FFF4;border:1.5px solid #66BB6A;border-radius:10px;padding:12px 13px;margin-bottom:12px;}
.tip-box h4{font-size:13px;font-weight:800;color:#1b5e20;margin-bottom:8px;}
.tip-box ul{list-style:none;padding:0;}
.tip-box li{font-size:12px;color:#1b5e20;font-weight:500;padding:4px 0 4px 20px;position:relative;line-height:1.55;}
.tip-box li::before{content:'💡';position:absolute;left:0;font-size:12px;}

/* ── 범례 ── */
.lr{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#555;}
.ld{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.dc{background:#90A4D4;}.ds{background:#FFB300;}

/* ── 판매조건 카드 그리드 (1열) ── */
.sg,.sg2{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:8px;}
.sc{border-radius:10px;padding:12px 13px;position:relative;cursor:pointer;transition:all .18s;user-select:none;min-height:60px;}
.sc.com{background:#F0F4FF;border:1.5px solid #90A4D4;}
.sc.spc{background:#FFFDF5;border:1.5px solid #FFB300;}
.sc:active{transform:scale(.98);}
.sc.selected.com{background:#D0DFFF;border:2.5px solid #003087;box-shadow:0 0 0 3px rgba(0,48,135,.18);}
.sc.selected.spc{background:#FFF0CC;border:2.5px solid #E65100;box-shadow:0 0 0 3px rgba(230,81,0,.18);}
.sc-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:transparent;transition:all .2s;pointer-events:none;}
.sc.selected .sc-check{background:#003087;border-color:#003087;color:#fff;}
.sc.selected.spc .sc-check{background:#E65100;border-color:#E65100;color:#fff;}
.sbg{position:absolute;top:10px;right:38px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff;pointer-events:none;}
.bcom{background:#90A4D4;}.bspc{background:#FF8F00;}
.slb{font-size:12px;font-weight:700;color:#333;margin-bottom:5px;padding-right:70px;line-height:1.4;}
.sv{font-size:13px;font-weight:600;color:#333;line-height:1.6;}
.hl{color:#E65100;font-weight:800;}.hlev{color:#00695C;font-weight:800;}.hlg{color:#1A1A2E;font-weight:800;}.hlp{color:#4527A0;font-weight:800;}

/* ── 프로모션 그리드 (1열) ── */
.pg{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:13px;}
.pc{background:#EBF5FB;border:1.5px solid #2980B9;border-radius:10px;padding:12px 13px;}
.pc.hi{background:#EAF4E9;border-color:#27AE60;}
.pt{font-size:13px;font-weight:800;color:#1565C0;margin-bottom:7px;}
.pt.g{color:#1b5e20;}
.pb{font-size:12px;font-weight:600;color:#333;line-height:1.7;}

hr.dv{border:none;border-top:2px dashed var(--bd);margin:13px 0;}

/* 배지 */
.badge-new{display:inline-block;background:#E53935;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;margin-left:4px;vertical-align:middle;letter-spacing:.5px;}
.badge-chg{display:inline-block;background:#FF8F00;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;margin-left:4px;vertical-align:middle;letter-spacing:.5px;}
.sc.new-item{border:2px solid #E53935 !important;box-shadow:0 0 0 2px rgba(229,57,53,.15);}
.sc.chg-item{border:2px solid #FF8F00 !important;box-shadow:0 0 0 2px rgba(255,143,0,.15);}
.new-row{background:#FFF5F5 !important;}
.chg-row{background:#FFF8E1 !important;}
.new-box{background:#FFF5F5;border-left:4px solid #E53935;border-radius:8px;padding:10px 13px;font-size:12px;color:#B71C1C;margin-bottom:12px;line-height:1.8;font-weight:500;}
.new-box strong{color:#E53935;}
.chg-box{background:#FFF8E1;border-left:4px solid #FF8F00;border-radius:8px;padding:10px 13px;font-size:12px;color:#E65100;margin-bottom:12px;line-height:1.65;font-weight:500;}
.chg-box strong{color:#FF8F00;}

/* ── 요약 섹션 ── */
.sum-sec{margin-bottom:20px;}
.sum-head{font-size:14px;font-weight:800;color:var(--p);padding:8px 0;margin-bottom:10px;border-bottom:2px solid var(--p);}
.th-m{background:#1B5E20 !important;}.th-n{background:#1565C0 !important;}

/* ── 할인바 (모바일 최적화) ── */
#discount-bar{position:fixed;bottom:0;left:0;right:0;z-index:500;background:linear-gradient(135deg,#001830,#002C5F);border-top:3px solid #00D4FF;box-shadow:0 -4px 20px rgba(0,48,135,.4);}
.dbar-collapsed{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;min-height:52px;}
.dbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.dbar-car-m{font-size:12px;font-weight:800;color:#00D4FF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.dbar-amt-wrap{display:flex;align-items:baseline;gap:3px;}
.dbar-total-val{font-size:22px;font-weight:900;color:#FFD700;line-height:1;}
.dbar-total-unit{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);}
.dbar-reset-m{background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.5);color:#FF6B6B;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0;}
.dbar-arrow{font-size:16px;color:rgba(255,255,255,.65);flex-shrink:0;margin-left:4px;}
.dbar-expanded{display:none;padding:8px 14px 14px;border-top:1px solid rgba(255,255,255,.1);}
.dbar-expanded.show{display:block;}
.dbar-items-m{display:flex;flex-wrap:wrap;gap:6px;min-height:26px;}
.dbar-chip{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);color:#fff;font-size:11px;font-weight:600;padding:5px 8px;border-radius:14px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.dbar-chip button{background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:0;line-height:1;margin-left:2px;}
.dbar-empty-m{font-size:11px;color:rgba(255,255,255,.4);font-style:italic;}
.dbar-meta{font-size:10px;color:rgba(255,255,255,.32);margin-top:6px;}
</style>
</head>
<body>

<!-- 오버레이 -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="top-header">
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="차종 메뉴">☰</button>
  <span class="region-badge">현대차 경남지역본부</span>
</div>

<div class="hero">
  <div class="hero-eyebrow">📓 경남 카마스터 시크릿 노트 Ep.4</div>
  <h1 class="hero-title">🚗 26년 5월 현대자동차<br><span class="ac">Sales All-in-One</span></h1>
  <p class="hero-sub">차종별 판매조건 · 판매팁 · 금융 프로모션을 한번에!</p>
</div>

<div class="layout">
  <!-- 드로어 사이드바 -->
  <aside class="sidebar" id="sidebar-root">
    <div class="sidebar-close-row">
      <span class="sidebar-close-title">🚗 차종 선택</span>
      <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <!-- 차종 버튼은 JS로 생성 -->
  </aside>
  <main class="main" id="main-root"></main>
</div>

<!-- 할인바 -->
<div id="discount-bar">
  <div class="dbar-collapsed" onclick="toggleDbar()">
    <div class="dbar-left">
      <span class="dbar-car-m" id="dbar-car-name">📌 차종 선택</span>
      <div class="dbar-amt-wrap">
        <span class="dbar-total-val" id="dbar-val">0</span>
        <span class="dbar-total-unit">만원</span>
      </div>
    </div>
    <button class="dbar-reset-m" onclick="event.stopPropagation();resetDiscount()">🔄 초기화</button>
    <span class="dbar-arrow" id="dbar-arrow">▲</span>
  </div>
  <div class="dbar-expanded" id="dbar-expanded">
    <div class="dbar-items-m" id="dbar-items">
      <span class="dbar-empty-m">카드 탭 시 자동 합산됩니다</span>
    </div>
    <div class="dbar-meta" id="dbar-count">※ 최대 기준 · 실제 조건 확인 필요</div>
  </div>
</div>

<script>
/* ════════════════════════════════
   기본 상태 & UI 제어
════════════════════════════════ */
let selectedItems=new Map();
let uidSeq=0;
let dbarOpen=false;

function toggleSidebar(){
  document.getElementById('sidebar-root').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar-root').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
function toggleDbar(){
  dbarOpen=!dbarOpen;
  document.getElementById('dbar-expanded').classList.toggle('show',dbarOpen);
  document.getElementById('dbar-arrow').textContent=dbarOpen?'▼':'▲';
}

function extractAmount(html){
  const t=html.replace(/<[^>]+>/g,'').replace(/\s+/g,' ');
  if(/해당\s*없/i.test(t))return 0;
  const sl=t.match(/(\d+)만\s*\/\s*(\d+)만/);
  if(sl)return Math.max(+sl[1],+sl[2]);
  const rng=t.match(/(\d+)\s*~\s*(?:최대\s*)?(\d+)만/);
  if(rng)return +rng[2];
  const mx=t.match(/최대\s*(\d+)만/);
  if(mx)return +mx[1];
  const sm=t.match(/\+?(\d+)만원?/);
  if(sm)return +sm[1];
  return 0;
}
function toggleDiscount(el){
  if(el.classList.contains('selected')){
    const uid=el.dataset.uid;
    if(uid){selectedItems.delete(uid);delete el.dataset.uid;}
    el.classList.remove('selected');
  }else{
    const label=el.dataset.label||'';
    const amount=el.dataset.amount!==undefined?+el.dataset.amount:0;
    const uid='u'+(++uidSeq);
    el.dataset.uid=uid;
    selectedItems.set(uid,{label,amount});
    el.classList.add('selected');
    if(!dbarOpen)toggleDbar();
  }
  renderBar();
}
function removeChip(uid){
  selectedItems.delete(uid);
  document.querySelectorAll('[data-uid="'+uid+'"]').forEach(el=>{el.classList.remove('selected');delete el.dataset.uid;});
  renderBar();
}
function resetDiscount(){
  selectedItems.clear();
  document.querySelectorAll('.sc.selected').forEach(el=>{el.classList.remove('selected');delete el.dataset.uid;});
  renderBar();
}
function renderBar(){
  const itemsEl=document.getElementById('dbar-items');
  const valEl=document.getElementById('dbar-val');
  const cntEl=document.getElementById('dbar-count');
  if(selectedItems.size===0){
    itemsEl.innerHTML='<span class="dbar-empty-m">카드 탭 시 자동 합산됩니다</span>';
    valEl.textContent='0';
    cntEl.textContent='※ 최대 기준 · 실제 조건 확인 필요';
    return;
  }
  let total=0,chips='';
  selectedItems.forEach((v,uid)=>{
    total+=v.amount;
    chips+=`<span class="dbar-chip">${v.label}${v.amount>0?' +'+v.amount+'만':''}<button onclick="removeChip('${uid}')">✕</button></span>`;
  });
  itemsEl.innerHTML=chips;
  valEl.textContent=total.toLocaleString();
  cntEl.textContent='조건 '+selectedItems.size+'개 선택 · ※ 최대 기준 · 실제 조건 확인 필요';
}
function showCar(id,name){
  document.querySelectorAll('.car-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.car-btn').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('panel-'+id);
  const b=document.getElementById('btn-'+id);
  if(p)p.classList.add('active');
  if(b)b.classList.add('active');
  resetDiscount();
  document.getElementById('dbar-car-name').textContent='📌 '+(name||id);
  closeSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='grandeur'){
    const gc=document.getElementById('grandeur-base-card');
    if(gc&&!gc.classList.contains('selected'))toggleDiscount(gc);
  }
}
function showVtab(g,t){
  document.querySelectorAll('.vtab[data-g="'+g+'"]').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.vpanel[data-g="'+g+'"]').forEach(x=>x.classList.remove('active'));

function showPtab(g,t){
